<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Прыгун</title>
    <link rel="stylesheet" href="mystyle.css">
    <script src="scriptfile.js"></script>
</head>
<body>
    <div id="mainMenu" class="main-menu">
        <div class="menu-container">
            <h1 class="game-title">🏆 ПРЫГУН 🏆</h1>
            <p class="game-subtitle">Будь ещё лучше, чем вчера</p>
            <div class="input-group">
                <label for="playerName">👤 Имя игрока:</label>
                <input type="text" id="playerName" class="name-input" placeholder="Введите ваше имя" maxlength="16">
            </div>
            <button id="startGameBtn" class="menu-start-btn">▶ НАЧАТЬ ИГРУ</button>
            <div class="menu-info">
                <p>🎮 Управление: ← → или A/D</p>
                <p>💀 Красные платформы = смерть!</p>
                <p>⭐ Получай как можно больше очков и разблокируй новых прыгунов!</p>
            </div>
        </div>
    </div>
    <div class="skin-selection" id="skinSelection">
        <button id="skin-label"><img src="losyash.png" alt="выбор прыгуна"></button>
    </div>

    <div id="skinModal" class="skin-modal hidden">
        <div class="skin-modal-content">
            <div class="skin-modal-header">
                <h2>🎨 ВЫБОР ПРЫГУНА</h2>
                <button id="closeSkinModal" class="close-modal">&times;</button>
            </div>
            <div id="skinsContainer" class="skins-container"></div>
        </div>
    </div>
<div class="rating-selection">
    <button id="rating-label" class="rating-btn">
        <img src="rating_icon.png" alt="рейтинг">
    </button>
</div>

<div id="ratingModal" class="rating-modal hidden">
    <div class="rating-modal-content">
        <div class="rating-modal-header">
            <h2>🏆 ИСТОРИЯ РЕКОРДОВ</h2>
            <button id="closeRatingModal" class="close-modal">&times;</button>
        </div>
        <div id="ratingContainer" class="rating-container">
        </div>
    </div>
</div>
<button id="themeToggle" class="theme-toggle-btn">🌙</button>
    <div id="gameScreen" class="game-screen hidden">
        <div class="game-wrapper">
            <div class="game-container">
                <canvas id="gameCanvas"></canvas>
                
                <div class="game-stats">
                    <div class="stat-item">🎯 Счёт: <span id="currentScore">0</span></div>
                    <div class="stat-item">🏆 Рекорд: <span id="bestScore">0</span></div>
                    <div class="stat-item">👤 <span id="currentPlayerName">Игрок</span></div>
                </div>
                
                <div id="gameOverlay" class="game-overlay hidden">
                    <div class="gameover-popup">
                        <h2>💀 GAME OVER 💀</h2>
                        <p>Ваш счёт: <span id="finalScore">0</span></p>
                        <button id="retryBtn" class="overlay-btn retry">🔄 Попробовать заново</button>
                        <button id="exitToMenuBtn" class="overlay-btn exit">🏠 Выйти в меню</button>
                    </div>
                </div>
                 <button id="pauseBtn" class="pause-btn">⏸</button>
                <div id="pauseModal" class="pause-modal hidden">
                    <div class="pause-modal-content">
                        <h2>⏸ ПАУЗА</h2>
                        <button id="resumeBtn" class="pause-btn-resume">▶ Продолжить игру</button>
                        <button id="exitToMenuFromPauseBtn" class="pause-btn-exit">🏠 Выйти в меню</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
